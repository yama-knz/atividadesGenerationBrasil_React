<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>

<body>

    <header>
        <h1>Entre em Contato</h1>

        <nav>
            <a href="index.html">Início</a> |
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main>

        <section>
            <h2>Fale Comigo</h2>

            <p>
                Caso queira entrar em contato, preencha o formulário abaixo
                ou utilize um dos meus canais profissionais.
            </p>
        </section>

        <section>
            <h2>Formulário de Contato</h2>

            <form>

                <label for="nome">Nome:</label>
                <br>
                <input type="text" id="nome" name="nome">
                <br><br>

                <label for="email">E-mail:</label>
                <br>
                <input type="email" id="email" name="email">
                <br><br>

                <label for="mensagem">Mensagem:</label>
                <br>
                <textarea id="mensagem" name="mensagem" rows="5" cols="40"></textarea>
                <br><br>

                <button type="submit">Enviar</button>

            </form>
        </section>

        <section>
            <h2>Meus Contatos</h2>

            <ul>
                <li>
                    <a href="igorkenzoyamamoto@gmail.com">
                        E-mail
                    </a>
                </li>

                <li>
                    <a href="https://www.linkedin.com/in/yamakenzodev/" target="_blank">
                        LinkedIn
                    </a>
                </li>

                <li>
                    <a href="https://github.com/yama-knz" target="_blank">
                        GitHub
                    </a>
                </li>
            </ul>
        </section>

    </main>

    <footer>
        <hr>
        <p>Desenvolvido para fins de estudo com HTML5.</p>
    </footer>

</body>

</html>
